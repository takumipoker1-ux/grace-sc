  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>

  <script>
    // ==================== CONFIG ====================
    // Vercel デプロイ後の URL に差し替える。例: https://grace-sc-api.vercel.app
    const API_BASE = 'https://grace-sc-api.vercel.app';
    const STORAGE_KEY = 'grace_unlock_token';

    const $ = (id) => document.getElementById(id);

    function getQueryParam(name) {
      return new URL(window.location.href).searchParams.get(name);
    }
    function parseHashParams() {
      const out = {};
      const raw = window.location.hash.replace(/^#/, '');
      if (!raw) return out;
      for (const pair of raw.split('&')) {
        const [k, v] = pair.split('=');
        if (k) out[decodeURIComponent(k)] = v ? decodeURIComponent(v) : '';
      }
      return out;
    }

    function showLoading() { $('loading-state').classList.remove('hidden'); $('locked-state').classList.add('hidden'); $('unlocked-state').classList.add('hidden'); }
    function showLocked(err) {
      $('loading-state').classList.add('hidden');
      $('locked-state').classList.remove('hidden');
      $('unlocked-state').classList.add('hidden');
      if (err) {
        $('error-banner').classList.remove('hidden');
        $('error-detail').textContent = describeError(err);
      }
    }
    function showUnlocked() { $('loading-state').classList.add('hidden'); $('locked-state').classList.add('hidden'); $('unlocked-state').classList.remove('hidden'); }

    function describeError(code) {
      const map = {
        'state_invalid': 'セッションが切れています。もう一度お試しください。',
        'unknown_article': '指定された記事が見つかりません。',
        'token_exchange_failed': 'X との認証に失敗しました。',
        'retweet_failed': 'リポストに失敗しました。X 側で権限をご確認ください。',
        'me_failed': 'X からユーザー情報を取得できませんでした。',
        'no_user_id': 'ユーザーIDを取得できませんでした。',
        'access_denied': '認証がキャンセルされました。',
        'fetch_failed': '本文の取得に失敗しました。時間を置いて再度お試しください。',
        'articles_config_unreadable': '記事設定の読み込みに失敗しました。',
      };
      return map[code] || `エラーコード: ${code}`;
    }

    async function fetchMeta(articleId) {
      try {
        const res = await fetch(`${API_BASE}/api/meta?id=${encodeURIComponent(articleId)}`);
        if (!res.ok) return null;
        return await res.json();
      } catch (e) { return null; }
    }

    async function fetchArticle(articleId, token) {
      try {
        const res = await fetch(`${API_BASE}/api/content?id=${encodeURIComponent(articleId)}`, {
          headers: { 'Authorization': `Bearer ${token}` },
        });
        if (!res.ok) {
          if (res.status === 401) return { error: 'not_unlocked' };
          return { error: 'fetch_failed' };
        }
        const md = await res.text();
        return { body: md };
      } catch (e) {
        return { error: 'fetch_failed' };
      }
    }

    function paintLockedHeader(meta) {
      if (!meta) {
        $('locked-title').textContent = '限定記事';
        return;
      }
      $('locked-title').textContent = meta.title || '限定記事';
      if (meta.subtitle) $('locked-subtitle').textContent = meta.subtitle;
    }
    function paintUnlockedHeader(meta) {
      if (!meta) return;
      $('unlocked-title').textContent = meta.title || '限定記事';
      if (meta.subtitle) $('unlocked-subtitle').textContent = meta.subtitle;
      document.title = `${meta.title}｜GRACE SELECTION`;
    }

    async function init() {
      showLoading();

      const articleId = getQueryParam('id');
      if (!articleId) {
        showLocked('unknown_article');
        $('locked-title').textContent = '記事IDが指定されていません';
        return;
      }

      const hashParams = parseHashParams();

      // callback からの戻り
      if (hashParams.token) {
        localStorage.setItem(STORAGE_KEY, hashParams.token);
        history.replaceState(null, '', `${window.location.pathname}?id=${encodeURIComponent(articleId)}`);
      }
      if (hashParams.unlock_error) {
        history.replaceState(null, '', `${window.location.pathname}?id=${encodeURIComponent(articleId)}`);
        const meta = await fetchMeta(articleId);
        paintLockedHeader(meta);
        showLocked(hashParams.unlock_error);
        return;
      }

      const meta = await fetchMeta(articleId);
      paintLockedHeader(meta);
      paintUnlockedHeader(meta);

      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        const result = await fetchArticle(articleId, stored);
        if (result.body) {
          $('article-body').innerHTML = marked.parse(result.body);
          showUnlocked();
          return;
        }
        if (result.error === 'not_unlocked') {
          // 既存トークンはあるがこの記事はまだアンロックされてない
          showLocked();
          return;
        }
        // 失敗時はトークン破棄してロック状態
        localStorage.removeItem(STORAGE_KEY);
        showLocked(result.error);
        return;
      }

      showLocked();
    }

    document.addEventListener('DOMContentLoaded', () => {
      $('unlock-btn').addEventListener('click', () => {
        const articleId = getQueryParam('id');
        const priorToken = localStorage.getItem(STORAGE_KEY);
        const priorPart = priorToken ? `&prior_token=${encodeURIComponent(priorToken)}` : '';
        window.location.href = `${API_BASE}/api/auth?id=${encodeURIComponent(articleId)}${priorPart}`;
      });
      $('forget-btn').addEventListener('click', () => {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      });
      init();
    });
  </script>
