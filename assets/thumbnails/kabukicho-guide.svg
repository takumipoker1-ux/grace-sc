<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="warm" cx="26%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#211A12"/>
      <stop offset="55%" stop-color="#120F0B"/>
      <stop offset="100%" stop-color="#0B0A08"/>
    </radialGradient>
    <radialGradient id="lift" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#C9A96E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="foil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0DFAE"/>
      <stop offset="52%" stop-color="#C9A96E"/>
      <stop offset="100%" stop-color="#8E7040"/>
    </linearGradient>
    <linearGradient id="foilrule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8D5A3"/>
      <stop offset="100%" stop-color="#8E7040"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#warm)"/>
  <ellipse cx="985" cy="330" rx="420" ry="380" fill="url(#lift)"/>

  <!-- 一字（題材の漢字・箔ゴースト） -->
  <text x="1175" y="512" text-anchor="end" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho','BIZ UDPMincho',serif" font-size="560" font-weight="600" fill="url(#foil)" opacity="0.13">歌</text>

  <!-- ヘアライン枠 -->
  <rect x="42" y="42" width="1116" height="546" fill="none" stroke="#C9A96E" stroke-opacity="0.34" stroke-width="1.5"/>

  <!-- カテゴリ -->
  <rect x="96" y="174" width="10" height="10" transform="rotate(45 101 179)" fill="url(#foil)"/>
  <text x="122" y="188" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="24" letter-spacing="7" font-weight="500" fill="#C9A96E">エリアガイド</text>

  <!-- タイトル -->
  <text x="96" y="348" font-family="'Noto Serif JP','Hiragino Mincho ProN','Yu Mincho','BIZ UDPMincho',serif" font-size="100" font-weight="600" fill="#F6F1E6" letter-spacing="2">歌舞伎町の実態</text>

  <!-- ブランド -->
  <rect x="96" y="452" width="104" height="2" fill="url(#foilrule)"/>
  <text x="96" y="496" font-family="'Noto Sans JP','Hiragino Sans','Yu Gothic','Meiryo',sans-serif" font-size="19" letter-spacing="4" font-weight="500" fill="url(#foil)">GRACE SELECTION<tspan fill="#A79E8C" letter-spacing="2" font-weight="400">　grace-sc.com</tspan></text>
</svg>
